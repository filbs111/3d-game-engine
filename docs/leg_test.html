<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <!-- <link rel='stylesheet' type='text/css' media='screen' href='main.css'> -->
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
    <script src='leg_test_main.js' defer></script>
</head>
<body>

    <canvas id="mycanvas"></canvas>
    
    <br/>
    
    <input type="range" id="hipAverageAngle" name="hipAverageAngle" min="-2" max="2" step="0.01" />
    <label for="hipAverageAngle">Hip Average Angle</label>
    
    <input type="range" id="hipAngleHalfRange" name="hipAngleHalfRange" min="0" max="2" step="0.01" />
    <label for="hipAngleHalfRange">Hip Angle Half Range</label>

    <br/>

    <input type="range" id="kneeAverageAngle" name="kneeAverageAngle" min="0" max="2" step="0.01" />
    <label for="kneeAverageAngle">Knee Average Angle</label>
    
    <input type="range" id="kneeAngleHalfRange" name="kneeAngleHalfRange" min="0" max="2" step="0.01" />
    <label for="kneeAngleHalfRange">Knee Angle Half Range</label>

    <input type="range" id="kneeAngleLag" name="kneeAngleLag" min="0" max="3" step="0.01" />
    <label for="kneeAngleLag">Knee Angle Lag</label>
    
    <br/>

    <input type="checkbox" id="reverseAnim" name="reverseAnim"/>
    <label for="reverseAnim">Reverse Animation</label>

</body>
</html>
