<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <!-- <link rel='stylesheet' type='text/css' media='screen' href='main.css'> -->
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
    <script type="text/javascript" src="lib/gl-matrix-min.js"></script>
    <script type="text/javascript" src="data/quad.js"></script>
    <script type="text/javascript" src="data/levelCubeData.js"></script>
    <script type="text/javascript" src="utils/keys.js"></script>
    <script type="text/javascript" src="utils/buffer_utils.js"></script>
    <script type="text/javascript" src="utils/fullscreen.js"></script>
    <script type="text/javascript" src="utils/object_loader.js"></script>
    <script type="text/javascript" src="utils/shader_loader.js"></script>
    <script type="text/javascript" src="utils/texture_utils.js"></script>
    <script type="text/javascript" src="utils/webgl_utils.js"></script>
    <script type="text/javascript" src='main.js'></script>
    <script type="text/javascript" src="utils/cubemap_rendering.js"></script>
    <script type="text/javascript" src="animation/bvh.min.js"></script>
    <script type="text/javascript" src="animation/animation_utils.js"></script>
</head>
<body onload="init()">
    <canvas id="mycanvas" width="0" height="0">CANVAS TO GO HERE</canvas>
    <div id="speedinfo"></div>
    <div>
    <input type="checkbox" id="externalcam" name="externalcamtoggle"/>
    <label for="externalcamtoggle">External Cam</label>
    <input type="checkbox" id="camfollowsplayer" name="camfollowsplayertoggle"/>
    <label for="camfollowsplayertoggle">External Cam Follows Player</label>
    <input type="checkbox" id="doubleguns" name="doublegunstoggle"/>
    <label for="doublegunstoggle">Double Guns</label>

    <br/>
    <p>Fisheye Lens Selection:</p>
    <input type="radio" id="fisheyeselection_off" name="fisheye_selection">
    <label for="fisheyeselection_none">Off</label><br>
    <input type="radio" id="fisheyeselection_simple" name="fisheye_selection" checked>
    <label for="fisheyeselection_simple">Simple</label>
    <input type="range" id="simple_strength" name="simple_strength" min="0" max="0.25" step="0.01" value="0.2" />
    <label for="simple_strength">Simple Fisheye Strength</label>

    <br/>
    <input type="radio" id="fisheyeselection_stereographic" name="fisheye_selection">
    <label for="fisheyeselection_stereographic">Stereographic</label>
    <input type="radio" id="fisheyeselection_equidistant" name="fisheye_selection">
    <label for="fisheyeselection_equidistant">Equidistant</label>
    <input type="radio" id="fisheyeselection_equisolid" name="fisheye_selection">
    <label for="fisheyeselection_equisolid">Equisolid</label>

    <br/>
    <input type="radio" id="fisheyeselection_thoby" name="fisheye_selection">
    <label for="fisheyeselection_thoby">Thoby</label>
    <input type="range" id="thobyk2" name="thobyk2" min="0.05" max="1" step="0.05" value="0.75" />
    <label for="thobyk2">Thoby k2</label>

    <br/>
    <input type="radio" id="fisheyeselection_orthographic" name="fisheye_selection">
    <label for="fisheyeselection_orthographic">Orthographic</label>
    
    <br/>
    <input type="radio" id="fisheyeselection_tanktheta" name="fisheye_selection">
    <label for="fisheyeselection_tanktheta">tan(k theta)</label>
    <input type="range" id="tanktheta_k" name="tanktheta_k" min="0.05" max="1" step="0.05" value="0.75" />
    <label for="tanktheta_k">tan(k theta) k value</label>

    <br/>
    <input type="radio" id="fisheyeselection_special" name="fisheye_selection">
    <label for="fisheyeselection_special">special</label>
    <input type="range" id="special_k" name="special_k" min="0.5" max="1" step="0.05" value="0.75" />
    <label for="special_k">special k value</label>
    
    <br/>
    <input type="range" id="camerazoom" name="camerazoom" min=".4" max="8" step="0.1" value="1.0" />
    <label for="camerazoom">Camera Zoom</label>

  </div>
</body>
</html>
